services:
  postgres:
    image: postgres:16-alpine
    container_name: framesense-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-framesense}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../app/api
      dockerfile: Dockerfile
    container_name: framesense-api
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-framesense}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_UPLOAD_MAX_BYTES: ${S3_UPLOAD_MAX_BYTES:-1073741824}
      INFERENCE_URL: ${INFERENCE_URL:-http://inference:8000}
      INFERENCE_TIMEOUT_MS: ${INFERENCE_TIMEOUT_MS:-900000}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      MIGRATION_TABLE_NAME: ${MIGRATION_TABLE_NAME:-schema_migrations}
      PRESIGNED_URL_EXPIRES_SEC: ${PRESIGNED_URL_EXPIRES_SEC:-3600}
      BACKEND_URL: ${BACKEND_URL:-http://api:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: framesense-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  inference:
    build:
      context: ./app/inference
      dockerfile: Dockerfile
    container_name: framesense-inference
    ports:
      - "${INFERENCE_PORT:-8000}:8000"
    environment:
      MODEL_PATH: ${MODEL_PATH:-facebook/sam3}
      INFERENCE_PORT: ${INFERENCE_PORT:-8000}
      REQUIRE_GPU: ${REQUIRE_GPU:-true}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-2}
      INFERENCE_TIMEOUT: ${INFERENCE_TIMEOUT:-30}
      SAMPLE_FPS: ${SAMPLE_FPS:-1.0}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      REDIS_URL: redis://redis:6379/0
      REDIS_JOB_QUEUE: ${REDIS_JOB_QUEUE:-inference:jobs}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

volumes:
  postgres_data:
